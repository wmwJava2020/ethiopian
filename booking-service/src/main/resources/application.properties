spring.application.name=booking-service

server.port=1941
spring.datasource.url=jdbc:mysql://localhost:3306/ethiopian?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Shows full error message in response
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
